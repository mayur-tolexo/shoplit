name: shoplit

services:
  postgres:
    image: postgres:16-alpine
    container_name: shoplit-pg
    environment:
      POSTGRES_USER: shoplit
      POSTGRES_PASSWORD: shoplit
      POSTGRES_DB: shoplit
    ports:
      # Host port 5433 (not the default 5432) to avoid clashing with other
      # postgres instances on the dev machine. Container internal port is
      # still 5432; only the host-side mapping is shifted.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shoplit -d shoplit"]
      interval: 2s
      timeout: 2s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: shoplit-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15

volumes:
  postgres_data:
  redis_data:
